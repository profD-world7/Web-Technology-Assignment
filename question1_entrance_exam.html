<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrance Exam Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"],
        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .radio-group {
            margin: 10px 0;
        }
        .radio-group label {
            display: inline;
            margin-right: 15px;
            font-weight: normal;
        }
        .checkbox-group {
            margin: 15px 0;
        }
        .checkbox-group label {
            display: inline;
            font-weight: normal;
        }
        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Entrance Exam Registration Form</h2>
        <form onsubmit="return validateForm()" method="get">
            <div class="form-group">
                <label for="fullname_presha">Full Name:</label>
                <input type="text" id="fullname_presha" name="fullname_presha">
            </div>

            <div class="form-group">
                <label for="dob_presha">Date of Birth:</label>
                <input type="date" id="dob_presha" name="dob_presha">
            </div>

            <div class="form-group">
                <label for="age_presha">Age:</label>
                <input type="number" id="age_presha" name="age_presha">
            </div>

            <div class="form-group">
                <label for="phone_presha">Phone Number:</label>
                <input type="text" id="phone_presha" name="phone_presha">
            </div>

            <div class="form-group">
                <label for="email_presha">Email Address:</label>
                <input type="text" id="email_presha" name="email_presha">
            </div>

            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <input type="radio" id="male_presha" name="gender_presha" value="Male">
                    <label for="male_presha">Male</label>
                    <input type="radio" id="female_presha" name="gender_presha" value="Female">
                    <label for="female_presha">Female</label>
                    <input type="radio" id="other_presha" name="gender_presha" value="Other">
                    <label for="other_presha">Other</label>
                </div>
            </div>

            <div class="form-group">
                <label for="stream_presha">Exam Stream:</label>
                <select id="stream_presha" name="stream_presha">
                    <option value="">-- Select Stream --</option>
                    <option value="Science">Science</option>
                    <option value="Management">Management</option>
                    <option value="Arts">Arts</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agreement_presha" name="agreement_presha">
                <label for="agreement_presha">I confirm all details are correct</label>
            </div>

            <input type="submit" value="Submit">
        </form>
    </div>

    <script>
        function validateForm() {
            // getting fromvalues
            let fullname = document.getElementById("fullname_presha").value;
            let dob = document.getElementById("dob_presha").value;
            let age = document.getElementById("age_presha").value;
            let phone = document.getElementById("phone_presha").value;
            let email = document.getElementById("email_presha").value;
            let gender = document.querySelector('input[name="gender_presha"]:checked');
            let stream = document.getElementById("stream_presha").value;
            let agreement = document.getElementById("agreement_presha").checked;

            // Validating Full Name
            if (fullname === "") {
                alert("Full Name is required");
                return false;
            }
            if (!/^[A-Za-z\s]+$/.test(fullname)) {
                alert("Name must contain only letters");
                return false;
            }

            // Validate Date of Birth
            if (dob === "") {
                alert("Date of Birth is required");
                return false;
            }

            // Validate Age
            if (age === "") {
                alert("Age is required");
                return false;
            }
            age = parseInt(age);
            if (age < 16 || age > 30) {
                alert("Age must be between 16 and 30");
                return false;
            }

            // Validate Phone Number
            if (phone === "") {
                alert("Phone Number is required");
                return false;
            }
            if (!/^(98|97)\d{8}$/.test(phone)) {
                alert("Phone number must be 10 digits and start with 98 or 97");
                return false;
            }

            // Validate Email
            if (email === "") {
                alert("Email Address is required");
                return false;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                alert("Email must be in valid format");
                return false;
            }

            // Validate Gender
            if (!gender) {
                alert("Please select a gender");
                return false;
            }

            // Validate Stream
            if (stream === "") {
                alert("Please select an Exam Stream");
                return false;
            }

            // Validate Agreement Checkbox
            if (!agreement) {
                alert("Please confirm that all details are correct");
                return false;
            }

            // Success message
            alert("Registration Successful!");
            
            // Wait 5 seconds and refresh page
            setTimeout(function() {
                location.reload();
            }, 5000);

            return false; // Prevent actual form submission
        }
    </script>
</body>
</html>
